# =============================================================
# base.yaml  —  Shared base configuration for all experiments
# =============================================================
# All condition-specific configs inherit from (or override) this file.
# Use OmegaConf / pydantic to load and merge configs.

# ── Model ──────────────────────────────────────────────────
model:
  name: "Qwen/Qwen2.5-1.5B-Instruct"
  revision: "main"
  dtype: "bfloat16"          # bfloat16 recommended for modern GPUs
  attn_implementation: "flash_attention_2"  # or "eager" if FA2 unavailable
  trust_remote_code: true
  max_length: 2048

# ── LoRA ───────────────────────────────────────────────────
lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# ── Training ───────────────────────────────────────────────
training:
  output_dir: "outputs/${experiment.condition_id}"
  max_steps: 500
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42
  dataloader_num_workers: 2
  remove_unused_columns: false
  # GRPO-specific
  num_generations: 8           # G in GRPO (samples per prompt)
  temperature: 0.9
  top_p: 0.95
  save_steps: 100
  eval_steps: 100
  logging_steps: 10
  fp16: false
  bf16: true

# ── Reward ─────────────────────────────────────────────────
reward:
  type: "baseline"             # one of: baseline | hackable | guardrailed
  answer_reward_weight: 1.0
  format_reward_weight: 0.0
  length_bonus_weight: 0.0
  # KL regularization
  kl_beta: 0.0                 # 0 = disabled
  # Hard length cap
  max_reasoning_tokens: null   # null = disabled

# ── Generation ─────────────────────────────────────────────
generation:
  max_new_tokens: 512
  do_sample: true
  temperature: 0.9
  top_p: 0.95
  top_k: 50
  repetition_penalty: 1.1
  num_return_sequences: 1

# ── Dataset ────────────────────────────────────────────────
dataset:
  name: "countdown"            # one of: countdown | gsm8k
  split_train: "train"
  split_eval: "validation"
  max_train_samples: null      # null = use all
  max_eval_samples: 500
  preprocessing_num_workers: 4
  # Countdown-specific
  countdown_min_digits: 1
  countdown_max_digits: 4
  countdown_num_numbers: 6

# ── Logging ────────────────────────────────────────────────
logging:
  level: "INFO"
  use_wandb: true
  wandb_project: "grpo-reward-hacking"
  wandb_entity: null           # set via WANDB_ENTITY env var or here
  use_tensorboard: true
  use_csv: true
  log_dir: "outputs/${experiment.condition_id}/logs"

# ── Experiment ─────────────────────────────────────────────
experiment:
  condition_id: "base"
  description: "Base configuration — do not run directly"
  tags: []
