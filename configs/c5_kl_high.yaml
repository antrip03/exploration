# =============================================================
# c5_kl_high.yaml  —  Condition 5: Hackable reward + KL β=0.1
# =============================================================
# Hackable reward with a strong KL divergence regularization.
# Highest beta in the sweep (C3–C5).

defaults:
  - base

experiment:
  condition_id: "c5_kl_high"
  description: "Hackable reward + KL regularization, beta=0.1 (strong)"
  tags: ["hackable", "kl-regularization", "beta-sweep"]

reward:
  type: "guardrailed"
  answer_reward_weight: 1.0
  format_reward_weight: 0.3
  length_bonus_weight: 0.1
  kl_beta: 0.1                # Strong KL penalty
  max_reasoning_tokens: null

training:
  output_dir: "outputs/c5_kl_high"
  seed: 42
