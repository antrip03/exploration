defaults:
  - base

experiment:
  condition_id: "c6_length_cap"
  description: "Hackable reward + hard reasoning length cap (no KL)"
  tags: ["hackable", "length-cap", "structural-guardrail"]

reward:
  type: "guardrailed"
  length_bonus_max: 0.5
  format_bonus: 0.15
  hard_length_cap: true
  hard_length_cap_tokens: 70  # provisional pilot placeholder; recalibrate after C2

training:
  output_dir: "outputs/c6_length_cap"
  beta: 0.0
  seed: 42
